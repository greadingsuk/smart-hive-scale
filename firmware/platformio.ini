; ─── GOLDEN MASTER (FireBeetle 2 ESP32-E) ──────────────────
; Production firmware for all scales (v2.0.0+).
; Source: main_v2.cpp  |  Board: DFR0654
; OTA disabled until fleet-wide validation complete.

[env:fb-golden]
board = dfrobot_firebeetle2_esp32e
build_src_filter = -<*> +<main_v2.cpp>
upload_port = COM6     ; FireBeetle CH340K — update per device
board_build.partitions = min_spiffs.csv
lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    bogde/HX711@^0.7.5
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
