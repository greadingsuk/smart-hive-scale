; Smart Hive Scale — PlatformIO Configuration
; Board: Wemos D1 Mini ESP32 (with 18650 battery shield)

[env:wemos_d1_mini32]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200

; Libraries
; WiFi + HTTPClient are built-in to the ESP32 Arduino framework
lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    bogde/HX711@^0.7.5
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

; Partition scheme with enough space for LittleFS (needed later for offline caching)
board_build.partitions = min_spiffs.csv
