; IoT Hive Stand — PlatformIO Configuration
; v2.0: Fleet standardised to DFRobot FireBeetle 2 ESP32-E
; Old Wemos environments retained for reference but deprecated.

; ─── Shared settings ────────────────────────────────────────
[platformio]
default_envs = fb-golden   ; Golden Master (FireBeetle 2)

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    bogde/HX711@^0.7.5
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11

board_build.partitions = min_spiffs.csv

; ─── HX711 Calibration (standalone) ─────────────────────────
[env:calibration]
upload_port = COM5
build_src_filter = -<*> +<calibration.cpp>
lib_deps =
    bogde/HX711@^0.7.5

; ─── IoT Hive Stand 1 (Hive 1) ─────────────────────────────
[env:hive-stand-1]
build_src_filter = +<*> -<calibration.cpp>
upload_port = COM5

; ─── IoT Hive Stand 2 (Hive 2) ─────────────────────────────
[env:hive-stand-2]
build_src_filter = +<*> -<calibration.cpp>
upload_port = COM5     ; Currently detected on COM5

; ─── FireBeetle 2 ESP32-E: Component Test Scripts ──────────
; Golden Master incremental build — one test at a time.
; Board: DFRobot FireBeetle 2 ESP32-E (DFR0654)

[env:fb-test-oled]
board = dfrobot_firebeetle2_esp32e
build_src_filter = -<*> +<test_oled.cpp>
upload_port = COM6     ; FireBeetle CH340K
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11

[env:fb-test-hx711]
