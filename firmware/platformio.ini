; IoT Hive Stand — PlatformIO Configuration
; Board: Wemos D1 Mini ESP32 (with 18650 battery shield)
; Multi-device: shared code, per-device upload targets

; ─── Shared settings ────────────────────────────────────────
[platformio]
default_envs = hive-stand-2   ; Change to hive-stand-1 when working on Device 1

[env]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.4.1
    bogde/HX711@^0.7.5
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

board_build.partitions = min_spiffs.csv

; ─── IoT Hive Stand 1 (Hive 1) ─────────────────────────────
[env:hive-stand-1]
; upload_port = COM?   ; Set when Device 1 is plugged in

; ─── IoT Hive Stand 2 (Hive 2) ─────────────────────────────
[env:hive-stand-2]
upload_port = COM5     ; Currently detected on COM5
