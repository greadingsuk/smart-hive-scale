name: Deploy Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'web-dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: web-dashboard
        run: npm ci

      - name: Build
        working-directory: web-dashboard
        run: npm run build
        env:
          VITE_TELEMETRY_READ_URL: ${{ secrets.VITE_TELEMETRY_READ_URL }}
          VITE_TELEMETRY_API_URL: ${{ secrets.VITE_TELEMETRY_API_URL }}
          VITE_AWEKAS_READ_URL: ${{ secrets.VITE_AWEKAS_READ_URL }}
          VITE_APIARY_READ_URL: ${{ secrets.VITE_APIARY_READ_URL }}
          VITE_APIARY_WRITE_URL: ${{ secrets.VITE_APIARY_WRITE_URL }}

      - name: Prepare deployment package
        working-directory: web-dashboard
        run: |
          mkdir -p deploy/public
          cp -r dist/* deploy/public/
          cp server.cjs deploy/
          cp package.json deploy/
          cd deploy && npm install --omit=dev
          zip -r ../../dashboard.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        run: |
          az webapp deploy \
            --resource-group rg-gr-personal-hivescale \
            --name apiary-ai \
            --src-path dashboard.zip \
            --type zip
